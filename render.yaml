# Render 部署配置
# 部署方式：在 Render 控制台 New → Web Service → 连接此仓库，
# 或直接在仓库根目录使用此文件（Render 会自动识别）。
# 本配置采用「单服务」架构：前后端同进程，SQLite 持久化到磁盘卷。
services:
  - type: web
    name: huiyu-salary
    runtime: pnpm
    plan: free
    region: oregon
    branch: main
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/health
    # 持久化卷：SQLite 数据写入 /data，避免重启/重部署后数据丢失
    volumes:
      - name: salary-data
        mountPath: /data
        sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        sync: false
      # 把 SQLite 文件指向持久化卷（覆盖 server/.env 里的默认路径）
      - key: DB_PATH
        value: /data/salary.db
